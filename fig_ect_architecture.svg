<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", "Liberation Serif", serif; fill: #222; }
  .b { font-weight: bold; }
  .it { font-style: italic; }
  .sm { font-size: 12px; fill: #555; }
  rect.n { rx: 10; stroke: #555; stroke-width: 1.2; }
  line.a { stroke: #333; stroke-width: 1.8; }
  line.ad { stroke: #999; stroke-width: 1.3; stroke-dasharray: 6 4; }
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="ard" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Row 1: Phi-medium -->
<rect class="n" x="190" y="20" width="300" height="60" fill="#c0c0c0"/>
<text x="340" y="45" text-anchor="middle" font-size="15">&#x3A6;-medium on M&#x2074;</text>
<text x="340" y="65" text-anchor="middle" font-size="14">P1&#x2013;P6, DP</text>

<!-- Arrow 1→2 -->
<line class="a" x1="340" y1="80" x2="340" y2="110" marker-end="url(#ar)"/>

<!-- Row 2: SSB -->
<rect class="n" x="120" y="112" width="440" height="95" fill="#d0d0d0"/>
<text x="340" y="137" text-anchor="middle" font-size="15">O(4) &#x2192; O(3) SSB</text>
<text x="340" y="158" text-anchor="middle" font-size="14">Ordered branch: &#x27E8;&#x2202;&#x2090;&#x3A6;&#x27E9; = u&#x2080; &#x3B4;&#x2090;w</text>
<text x="340" y="178" text-anchor="middle" font-size="14">Lorentzian window: &#x3B1; &gt; &#x3B2;</text>
<text x="340" y="198" text-anchor="middle" font-size="14">Benchmark realisation: &#x3B1; = 2&#x3B2;</text>

<!-- Arrow 2→3 -->
<line class="a" x1="340" y1="207" x2="340" y2="237" marker-end="url(#ar)"/>

<!-- Row 3: Ordered-branch action -->
<rect class="n" x="155" y="239" width="370" height="60" fill="#d8d8d8"/>
<text x="340" y="262" text-anchor="middle" font-size="15">S_ord[u, n]</text>
<text x="340" y="284" text-anchor="middle" font-size="14">K&#x1D2C;&#x1D2E; = &#x3B2; &#x3B4;&#x1D2C;&#x1D2E; &#x2212; &#x3B1; n&#x1D2C; n&#x1D2E;</text>

<!-- Arrows 3→4a and 3→4b (diagonal) -->
<line class="a" x1="255" y1="299" x2="175" y2="360" marker-end="url(#ar)"/>
<line class="a" x1="425" y1="299" x2="505" y2="360" marker-end="url(#ar)"/>

<!-- Row 4a: Geometric branch -->
<rect class="n" x="35" y="362" width="280" height="80" fill="#e5e5e5"/>
<text class="b" x="175" y="386" text-anchor="middle" font-size="14">Geometric branch</text>
<text x="175" y="406" text-anchor="middle" font-size="13">(Macroscopic Physics, Part II)</text>
<text x="175" y="426" text-anchor="middle" font-size="13">Long-wavelength amplitude/orientation</text>

<!-- Row 4b: Coherent branch -->
<rect class="n" x="365" y="362" width="280" height="80" fill="#e5e5e5"/>
<text class="b" x="505" y="386" text-anchor="middle" font-size="14">Coherent branch</text>
<text x="505" y="406" text-anchor="middle" font-size="13">(Quantum Sector, Part III)</text>
<text x="505" y="426" text-anchor="middle" font-size="13">Short-wavelength phase/winding</text>

<!-- Arrows 4a→5a and 4b→5b -->
<line class="a" x1="175" y1="442" x2="175" y2="490" marker-end="url(#ar)"/>
<line class="a" x1="505" y1="442" x2="505" y2="490" marker-end="url(#ar)"/>

<!-- Row 5a: Geo sub -->
<rect class="n" x="25" y="492" width="300" height="80" fill="#efefef"/>
<text x="175" y="515" text-anchor="middle" font-size="14">Einstein sector, G&#x2099; matching</text>
<text x="175" y="535" text-anchor="middle" font-size="14">Cosmology, galactic &#x3C6;-branch</text>
<text x="175" y="555" text-anchor="middle" font-size="14">BTFR, RAR, cluster lensing</text>

<!-- Row 5b: Coh sub -->
<rect class="n" x="355" y="492" width="300" height="80" fill="#efefef"/>
<text x="505" y="515" text-anchor="middle" font-size="14">S&#x2080;, Hilbert bridge, decoherence</text>
<text x="505" y="535" text-anchor="middle" font-size="14">PES, Born route, entanglement</text>
<text x="505" y="555" text-anchor="middle" font-size="14">Vacuum response, BH information</text>

<!-- Back-reaction double arrow -->
<line class="ad" x1="325" y1="532" x2="360" y2="532"/>
<line class="ad" x1="320" y1="532" x2="290" y2="532"/>
<text x="340" y="505" text-anchor="middle" font-size="12" fill="#888" font-style="italic">back-reaction (single condensate)</text>

<!-- Arrows 5a→6 and 5b→6 (diagonal) -->
<line class="a" x1="230" y1="572" x2="280" y2="650" marker-end="url(#ar)"/>
<line class="a" x1="450" y1="572" x2="400" y2="650" marker-end="url(#ar)"/>

<!-- Row 6: Predictions -->
<rect class="n" x="100" y="652" width="480" height="80" fill="#d5d5d5"/>
<text class="b" x="340" y="676" text-anchor="middle" font-size="14">Predictions, falsifiers, open problems</text>
<text x="340" y="698" text-anchor="middle" font-size="14">BTFR slope 4, g&#x2020; &#x2248; cH&#x2080;/(2&#x3C0;), LIV, 5th force</text>
<text x="340" y="718" text-anchor="middle" font-size="14">Casimir 3/2, Unruh, decoherence anchors</text>

</svg>
