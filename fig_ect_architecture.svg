<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", "Liberation Serif", serif; fill: #222; }
  .b { font-weight: bold; }
  .it { font-style: italic; fill: #777; }
  rect.n { rx: 10; stroke: #555; stroke-width: 1.2; }
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Row 1: Phi-medium -->
<rect class="n" x="190" y="15" width="300" height="55" fill="#c0c0c0"/>
<text x="340" y="38" text-anchor="middle" font-size="15">&#x3A6;-medium on M4</text>
<text x="340" y="58" text-anchor="middle" font-size="14">P1&#x2013;P6, DP</text>

<!-- Arrow 1-2 -->
<line x1="340" y1="70" x2="340" y2="95" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- Row 2: SSB -->
<rect class="n" x="115" y="98" width="450" height="95" fill="#d0d0d0"/>
<text x="340" y="122" text-anchor="middle" font-size="15">O(4) &#x2192; O(3) SSB</text>
<text x="340" y="143" text-anchor="middle" font-size="14">Ordered branch: &#x27E8;dA&#x3A6;&#x27E9; = u0 dAw</text>
<text x="340" y="163" text-anchor="middle" font-size="14">Lorentzian window: &#x3B1; &gt; &#x3B2;</text>
<text x="340" y="183" text-anchor="middle" font-size="14">Benchmark realisation: &#x3B1; = 2&#x3B2;</text>

<!-- Arrow 2-3 -->
<line x1="340" y1="193" x2="340" y2="218" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- Row 3: Ordered-branch action -->
<rect class="n" x="155" y="221" width="370" height="55" fill="#d8d8d8"/>
<text x="340" y="244" text-anchor="middle" font-size="15">Sord[u, n]</text>
<text x="340" y="265" text-anchor="middle" font-size="14">KAB = &#x3B2; dAB &#x2212; &#x3B1; nA nB</text>

<!-- Diagonal arrows 3-4a, 3-4b -->
<line x1="245" y1="276" x2="160" y2="328" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="435" y1="276" x2="520" y2="328" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- Row 4a: Geometric branch -->
<rect class="n" x="15" y="330" width="260" height="75" fill="#e5e5e5"/>
<text class="b" x="145" y="353" text-anchor="middle" font-size="14">Geometric branch</text>
<text x="145" y="373" text-anchor="middle" font-size="13">(Macroscopic Physics, Part II)</text>
<text x="145" y="393" text-anchor="middle" font-size="13">Long-wavelength amplitude/orientation</text>

<!-- Row 4b: Coherent branch -->
<rect class="n" x="405" y="330" width="260" height="75" fill="#e5e5e5"/>
<text class="b" x="535" y="353" text-anchor="middle" font-size="14">Coherent branch</text>
<text x="535" y="373" text-anchor="middle" font-size="13">(Quantum Sector, Part III)</text>
<text x="535" y="393" text-anchor="middle" font-size="13">Short-wavelength phase/winding</text>

<!-- Arrows 4a-5a, 4b-5b -->
<line x1="145" y1="405" x2="145" y2="448" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="535" y1="405" x2="535" y2="448" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- Row 5a: Geo sub (narrower, leave gap) -->
<rect class="n" x="15" y="450" width="260" height="75" fill="#efefef"/>
<text x="145" y="473" text-anchor="middle" font-size="14">Einstein sector, GN matching</text>
<text x="145" y="493" text-anchor="middle" font-size="14">Cosmology, galactic phi-branch</text>
<text x="145" y="513" text-anchor="middle" font-size="14">BTFR, RAR, cluster lensing</text>

<!-- Row 5b: Coh sub -->
<rect class="n" x="405" y="450" width="260" height="75" fill="#efefef"/>
<text x="535" y="473" text-anchor="middle" font-size="14">S0, Hilbert bridge, decoherence</text>
<text x="535" y="493" text-anchor="middle" font-size="14">PES, Born route, entanglement</text>
<text x="535" y="513" text-anchor="middle" font-size="14">Vacuum response, BH information</text>

<!-- Back-reaction dashed arrow between 5a and 5b -->
<text x="340" y="475" text-anchor="middle" font-size="12" fill="#888" font-style="italic">back-reaction</text>
<text x="340" y="492" text-anchor="middle" font-size="12" fill="#888" font-style="italic">(single condensate)</text>
<line x1="278" y1="500" x2="402" y2="500" stroke="#999" stroke-width="1.3" stroke-dasharray="6 4" marker-start="url(#ag)" marker-end="url(#ag)"/>

<!-- Diagonal arrows 5a-6, 5b-6 -->
<line x1="200" y1="525" x2="260" y2="598" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="480" y1="525" x2="420" y2="598" stroke="#333" stroke-width="1.8" marker-end="url(#ar)"/>

<!-- Row 6: Predictions -->
<rect class="n" x="95" y="600" width="490" height="75" fill="#d5d5d5"/>
<text class="b" x="340" y="623" text-anchor="middle" font-size="14">Predictions, falsifiers, open problems</text>
<text x="340" y="645" text-anchor="middle" font-size="14">BTFR slope 4, g&#x2020; &#x2248; cH0/(2&#x3C0;), LIV, 5th force</text>
<text x="340" y="665" text-anchor="middle" font-size="14">Casimir 3/2, Unruh, decoherence anchors</text>

</svg>
