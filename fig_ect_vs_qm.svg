<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", "Liberation Serif", serif; fill: #222; }
  .b { font-weight: bold; font-size: 14px; }
  .s { font-size: 12px; fill: #555; }
  .hdr { font-weight: bold; font-size: 15px; }
  rect.cell { fill: #f0f0f0; stroke: #999; stroke-width: 0.6; rx: 4; }
  rect.header { fill: #ddd; stroke: #888; stroke-width: 0.8; rx: 8; }
</style>

<rect class="header" x="30" y="20" width="295" height="40"/>
<text class="hdr" x="177" y="44" text-anchor="middle">Standard quantum mechanics</text>

<rect class="header" x="355" y="20" width="295" height="40"/>
<text class="hdr" x="502" y="44" text-anchor="middle">Euclidean Condensate Theory</text>

<line x1="340" y1="75" x2="340" y2="400" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 3"/>

<rect class="cell" x="30" y="78" width="295" height="50"/>
<text class="b" x="177" y="97" text-anchor="middle">Cauchy (initial-value) problem</text>
<text class="s" x="177" y="116" text-anchor="middle">ψ(x, t₀) given → evolve forward</text>

<rect class="cell" x="355" y="78" width="295" height="50"/>
<text class="b" x="502" y="97" text-anchor="middle">Boundary-value (elliptic) problem</text>
<text class="s" x="502" y="116" text-anchor="middle">Φ(X) on entire M⁴</text>

<rect class="cell" x="30" y="143" width="295" height="50"/>
<text class="b" x="177" y="162" text-anchor="middle">iℏ ∂ₜψ = Hψ</text>
<text class="s" x="177" y="181" text-anchor="middle">Schrödinger / Dirac equation</text>

<rect class="cell" x="355" y="143" width="295" height="50"/>
<text class="b" x="502" y="162" text-anchor="middle">δᴬᴮ ∂ₐ∂ᴮΦ − V′(Φ) = 0</text>
<text class="s" x="502" y="181" text-anchor="middle">Euclidean condensate equation</text>

<rect class="cell" x="30" y="208" width="295" height="50"/>
<text class="b" x="177" y="227" text-anchor="middle">|ψ|² = Born rule</text>
<text class="s" x="177" y="246" text-anchor="middle">Fundamental axiom</text>

<rect class="cell" x="355" y="208" width="295" height="50"/>
<text class="b" x="502" y="227" text-anchor="middle">|ψ|² from coarse-graining</text>
<text class="s" x="502" y="246" text-anchor="middle">Emergent, not axiom</text>

<rect class="cell" x="30" y="273" width="295" height="50"/>
<text class="b" x="177" y="292" text-anchor="middle">Time: fundamental coordinate</text>
<text class="s" x="177" y="311" text-anchor="middle">Lorentzian spacetime a priori</text>

<rect class="cell" x="355" y="273" width="295" height="50"/>
<text class="b" x="502" y="292" text-anchor="middle">Time: emergent from SSB</text>
<text class="s" x="502" y="311" text-anchor="middle">O(4) → O(3) selects w-direction</text>

<rect class="cell" x="30" y="338" width="295" height="50"/>
<text class="b" x="177" y="357" text-anchor="middle">Measurement: extra postulate</text>
<text class="s" x="177" y="376" text-anchor="middle">Collapse / decoherence added</text>

<rect class="cell" x="355" y="338" width="295" height="50"/>
<text class="b" x="502" y="357" text-anchor="middle">Measurement: E → L transition</text>
<text class="s" x="502" y="376" text-anchor="middle">Under environmental locking</text>
</svg>
