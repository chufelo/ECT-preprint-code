<svg width="700" height="460" viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", Georgia, serif; fill: #222; }
</style>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#555" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<path id="arcExt" d="M 60,200 A 180,180 0 0,1 420,200" fill="none"/>
<path id="arcShell" d="M 108,200 A 130,130 0 0,1 372,200" fill="none"/>
<path id="arcInt" d="M 165,200 A 72,72 0 0,1 305,200" fill="none"/>
<path id="arcBoundary" d="M 95,200 A 143,143 0 0,1 385,200" fill="none"/>
</defs>

<circle cx="240" cy="200" r="180" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
<circle cx="240" cy="200" r="130" fill="#d0d0d0" stroke="#666" stroke-width="1.5" stroke-dasharray="8 5"/>
<circle cx="240" cy="200" r="72" fill="#aaaaaa" stroke="#666" stroke-width="1.5"/>

<text font-size="14" font-style="italic">
<textPath href="#arcExt" startOffset="50%" text-anchor="middle">Hext : asymptotically accessible exterior</textPath>
</text>

<text font-size="11" fill="#444">
<textPath href="#arcBoundary" startOffset="50%" text-anchor="middle">--- critical shell boundary ---</textPath>
</text>

<text font-size="13" font-style="italic">
<textPath href="#arcShell" startOffset="50%" text-anchor="middle">Hshell : ordered-phase shell</textPath>
</text>

<text x="240" y="192" text-anchor="middle" font-size="13" font-style="italic">Hint :</text>
<text x="240" y="210" text-anchor="middle" font-size="12">inaccessible</text>
<text x="240" y="226" text-anchor="middle" font-size="12">strong-field sector</text>

<line x1="440" y1="110" x2="355" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="450" y="95" font-size="13" fill="#333">Strong-field coupling of</text>
<text x="450" y="113" font-size="13" fill="#333">coherent and topological modes</text>

<line x1="440" y1="290" x2="310" y2="230" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="450" y="278" font-size="13" fill="#333">Observer traces over</text>
<text x="450" y="296" font-size="13" fill="#333">shell + interior sectors</text>

<line x1="330" y1="360" x2="380" y2="395" stroke="#555" stroke-width="1.0" stroke-dasharray="5 3" marker-end="url(#arr)"/>

<rect x="385" y="385" width="270" height="40" rx="6" fill="white" stroke="#666" stroke-width="1.2"/>
<text x="520" y="403" text-anchor="middle" font-size="14" font-style="italic">
<tspan>&#x3C1;</tspan><tspan font-size="10" dy="3">ext</tspan>
<tspan dy="-3" font-style="normal"> = Tr</tspan><tspan font-size="10" dy="3">sh,int</tspan>
<tspan dy="-3" font-style="normal"> |</tspan><tspan>&#x3A8;</tspan><tspan font-style="normal">&#x27E9;&#x27E8;</tspan><tspan>&#x3A8;</tspan><tspan font-style="normal">|</tspan>
</text>

</svg>
