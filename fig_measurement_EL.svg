<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", "Liberation Serif", serif; fill: #222; }
  .b { font-weight: bold; font-size: 13px; }
  .s { font-size: 11px; fill: #555; }
  .lbl { font-size: 11px; fill: #777; font-style: italic; }
  rect.box { fill: #f0f0f0; stroke: #999; stroke-width: 0.6; rx: 6; }
  line.ar { stroke: #666; stroke-width: 1.2; }
  polygon.ah { fill: #666; }
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect class="box" x="10" y="30" width="128" height="210"/>
<text class="b" x="74" y="58" text-anchor="middle">Euclidean</text>
<text class="b" x="74" y="75" text-anchor="middle">coherent regime</text>
<text class="s" x="74" y="112" text-anchor="middle">&#x393;loop &#x226A; 1</text>
