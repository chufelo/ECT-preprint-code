<text class="lbl" x="558" y="105" text-anchor="middle">classical</text>
<text class="lbl" x="558" y="120" text-anchor="middle">limit</text>
<line class="ar" x1="517" y1="140" x2="580" y2="140" marker-end="url(#ar)"/>

<rect class="box" x="584" y="30" width="86" height="210"/>
<text class="b" x="627" y="55" text-anchor="middle">Effective</text>
<text class="b" x="627" y="72" text-anchor="middle">Lorentzian</text>
<text class="b" x="627" y="89" text-anchor="middle">outcome</text>
