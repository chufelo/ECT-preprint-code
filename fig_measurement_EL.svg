<line class="ar" x1="138" y1="140" x2="206" y2="140" marker-end="url(#ar)"/>

<rect class="box" x="210" y="30" width="115" height="210"/>
<text class="b" x="267" y="58" text-anchor="middle">Environmental</text>
<text class="b" x="267" y="75" text-anchor="middle">coupling</text>
<text class="s" x="267" y="112" text-anchor="middle">Neff &#x226B; 1 modes</text>
<text class="s" x="267" y="155" text-anchor="middle">Decoherence</text>
<text class="s" x="267" y="170" text-anchor="middle">functional</text>
<text class="s" x="267" y="185" text-anchor="middle">&#x393;[q] grows</text>

<text class="lbl" x="372" y="105" text-anchor="middle">Neff &#x3B3;t</text>
<text class="lbl" x="372" y="120" text-anchor="middle">&#x2192; 1</text>
<line class="ar" x1="325" y1="140" x2="398" y2="140" marker-end="url(#ar)"/>

<rect class="box" x="402" y="30" width="115" height="210"/>
<text class="b" x="459" y="58" text-anchor="middle">E &#x2192; L</text>
<text class="b" x="459" y="75" text-anchor="middle">transition</text>
<text class="s" x="459" y="112" text-anchor="middle">&#x393;loop &#x2273; 1</text>
<text class="s" x="459" y="155" text-anchor="middle">Off-diagonal</text>
