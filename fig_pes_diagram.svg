<svg width="680" height="640" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Times New Roman", "Liberation Serif", serif; fill: #222; }
  .bold { font-weight: bold; }
  .sub { fill: #777; font-style: italic; }
  .note { fill: #444; font-style: italic; }
</style>

<defs>
<clipPath id="cTop"><circle cx="340" cy="215" r="170"/></clipPath>
<clipPath id="cLeft"><circle cx="240" cy="365" r="170"/></clipPath>
<clipPath id="cRight"><circle cx="440" cy="365" r="170"/></clipPath>
</defs>

<circle cx="340" cy="215" r="170" fill="#e8e8e8" stroke="#888" stroke-width="1.2"/>
<circle cx="240" cy="365" r="170" fill="#e8e8e8" stroke="#888" stroke-width="1.2"/>
<circle cx="440" cy="365" r="170" fill="#e8e8e8" stroke="#888" stroke-width="1.2"/>

<g clip-path="url(#cTop)"><circle cx="240" cy="365" r="170" fill="#d0d0d0"/></g>
<g clip-path="url(#cTop)"><circle cx="440" cy="365" r="170" fill="#d0d0d0"/></g>
<g clip-path="url(#cLeft)"><circle cx="440" cy="365" r="170" fill="#d0d0d0"/></g>

<g clip-path="url(#cTop)"><g clip-path="url(#cLeft)"><circle cx="440" cy="365" r="170" fill="#b8b8b8"/></g></g>

<text class="bold" x="340" y="88" text-anchor="middle" font-size="17">Extremal</text>
<text x="340" y="112" text-anchor="middle" font-size="16">(stationary action)</text>

<text class="bold" x="200" y="415" text-anchor="middle" font-size="16">Decoherence-resistant</text>
<text x="200" y="440" text-anchor="middle" font-size="15">(&#x393;_loop &#x226A; 1)</text>

<text class="bold" x="480" y="415" text-anchor="middle" font-size="16">Phase-compact</text>
<text x="480" y="440" text-anchor="middle" font-size="15">(integer winding)</text>

<text class="sub" x="248" y="248" text-anchor="middle" font-size="14">smooth</text>
<text class="sub" x="248" y="267" text-anchor="middle" font-size="14">extremal</text>
<text class="sub" x="432" y="248" text-anchor="middle" font-size="14">compact</text>
<text class="sub" x="432" y="267" text-anchor="middle" font-size="14">extremal</text>
<text class="sub" x="340" y="418" text-anchor="middle" font-size="14">stable</text>
<text class="sub" x="340" y="437" text-anchor="middle" font-size="14">coherent</text>

<text class="bold" x="340" y="305" text-anchor="middle" font-size="17">PES</text>
<text class="bold" x="340" y="328" text-anchor="middle" font-size="16">persistent</text>
<text class="bold" x="340" y="351" text-anchor="middle" font-size="16">configuration</text>

<text class="note" x="340" y="582" text-anchor="middle" font-size="16" letter-spacing="0.3">Observable quantum states = configurations satisfying</text>
<text class="note" x="340" y="610" text-anchor="middle" font-size="16" letter-spacing="0.3">all three conditions simultaneously</text>
</svg>
